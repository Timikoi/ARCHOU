<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>ARCHOU.fr - MultiOutilsLikma</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0b0f19;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 650px;
      background: #111827;
      padding: 24px;
      border-radius: 16px;
      border: 1px solid #1f2937;
      box-shadow: 0 0 40px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #22c55e, #38bdf8);
      -webkit-background-clip: text;
      color: transparent;
    }

    .input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: #1f2937;
      color: #e5e7eb;
      margin-bottom: 12px;
      font-size: 15px;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #22c55e, #38bdf8);
      color: #111827;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 16px;
    }

    .error {
      color: #f87171;
      margin-bottom: 12px;
      display: none;
    }

    #privateContent {
      display: none;
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      background: #1f2937;
      border: 1px solid #374151;
    }

    iframe {
      width: 100%;
      height: 320px;
      border-radius: 12px;
      border: 1px solid #374151;
      display: none;
      margin-bottom: 16px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .action-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: #1f2937;
      color: #e5e7eb;
      cursor: pointer;
      font-weight: 600;
    }

    .comments {
      margin-top: 20px;
    }

    .comment {
      background: #111827;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #374151;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>ARCHOU.fr — Accès Privé</h1>

    <input type="password" id="passwordInput" class="input" placeholder="Mot de passe">
    <button class="btn" id="loginBtn">Déverrouiller</button>

    <div id="errorMsg" class="error">Mot de passe incorrect.</div>

    <div id="privateContent">
      <h2>Lecteur vidéo ARCHOU</h2>
      <p>Colle un lien de vidéo :</p>

      <input type="text" id="ytLink" class="input" placeholder="https://www.youtube.com/watch?v=XXXX">
      <button class="btn" id="loadVideoBtn">Charger la vidéo</button>

      <iframe id="ytPlayer" allowfullscreen></iframe>

      <div class="actions">
        <button id="likeBtn" class="action-btn">👍 J'aime (<span id="likeCount">0</span>)</button>
        <button id="subBtn" class="action-btn">🔔 S'abonner</button>
      </div>

      <div class="comments">
        <h3>Commentaires</h3>
        <input type="text" id="commentInput" class="input" placeholder="Écris un commentaire...">
        <button class="btn" id="sendComment">Envoyer</button>

        <div id="commentList"></div>
      </div>
    </div>
  </div>

  <script>
    // Mot de passe
    const ARCHOU_PASSWORD = "privateGO7899";

    const loginBtn = document.getElementById("loginBtn");
    const passwordInput = document.getElementById("passwordInput");
    const errorMsg = document.getElementById("errorMsg");
    const privateContent = document.getElementById("privateContent");

    loginBtn.addEventListener("click", () => {
      if (passwordInput.value === ARCHOU_PASSWORD) {
        errorMsg.style.display = "none";
        privateContent.style.display = "block";
      } else {
        errorMsg.style.display = "block";
        privateContent.style.display = "none";
      }
    });

    // Lecteur YouTube
    const ytBtn = document.getElementById("loadVideoBtn");
    const ytInput = document.getElementById("ytLink");
    const ytPlayer = document.getElementById("ytPlayer");

    ytBtn.addEventListener("click", () => {
      const url = ytInput.value.trim();
      const match = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);

      if (!match) {
        alert("Lien YouTube invalide");
        return;
      }

      const videoId = match[1];
      ytPlayer.src = `https://www.youtube.com/embed/${videoId}`;
      ytPlayer.style.display = "block";
    });

    // LIKE SYSTEM
    let likes = localStorage.getItem("archou_likes") || 0;
    document.getElementById("likeCount").textContent = likes;

    document.getElementById("likeBtn").addEventListener("click", () => {
      likes++;
      localStorage.setItem("archou_likes", likes);
      document.getElementById("likeCount").textContent = likes;
    });

    // SUBSCRIBE SYSTEM
    let subscribed = localStorage.getItem("archou_sub") === "true";

    const subBtn = document.getElementById("subBtn");
    function updateSubBtn() {
      subBtn.textContent = subscribed ? "✔️ Abonné" : "🔔 S'abonner";
    }
    updateSubBtn();

    subBtn.addEventListener("click", () => {
      subscribed = !subscribed;
      localStorage.setItem("archou_sub", subscribed);
      updateSubBtn();
    });

    // COMMENTS SYSTEM
    const commentInput = document.getElementById("commentInput");
    const commentList = document.getElementById("commentList");

    function loadComments() {
      const comments = JSON.parse(localStorage.getItem("archou_comments") || "[]");
      commentList.innerHTML = "";
      comments.forEach(c => {
        const div = document.createElement("div");
        div.className = "comment";
        div.textContent = c;
        commentList.appendChild(div);
      });
    }

    loadComments();

    document.getElementById("sendComment").addEventListener("click", () => {
      const text = commentInput.value.trim();
      if (!text) return;

      const comments = JSON.parse(localStorage.getItem("archou_comments") || "[]");
      comments.push(text);
      localStorage.setItem("archou_comments", JSON.stringify(comments));

      commentInput.value = "";
      loadComments();
    });
  </script>
</body>
</html>
