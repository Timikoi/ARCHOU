<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ARCHOU-Tube</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* --- STYLE GLOBAL --- */
body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: #0f0f0f;
  color: #fff;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: #181818;
  border-bottom: 1px solid #333;
}
.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 20px;
}
.logo-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg,#22c55e,#38bdf8);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  color: #000;
}
.search {
  display: flex;
  flex: 1;
  max-width: 500px;
  margin: 0 20px;
}
.search input {
  flex: 1;
  padding: 8px;
  border-radius: 20px 0 0 20px;
  border: 1px solid #333;
  background: #121212;
  color: #fff;
}
.search button {
  padding: 8px 14px;
  border-radius: 0 20px 20px 0;
  border: 1px solid #333;
  background: #272727;
  color: #fff;
  cursor: pointer;
}
main {
  padding: 16px;
}

/* --- ACCUEIL --- */
#home {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
  gap: 16px;
}
.video-card {
  cursor: pointer;
}
.video-card img {
  width: 100%;
  border-radius: 12px;
}
.video-title {
  font-size: 14px;
  font-weight: 600;
  margin-top: 6px;
}
.video-meta {
  font-size: 12px;
  color: #aaa;
}

/* --- PAGE VIDEO --- */
#watch {
  display: none;
}
.player {
  width: 100%;
}
.player iframe {
  width: 100%;
  aspect-ratio: 16/9;
  border: none;
  border-radius: 12px;
}
.actions {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}
.actions button {
  padding: 8px 12px;
  border-radius: 20px;
  border: 1px solid #333;
  background: #181818;
  color: #fff;
  cursor: pointer;
}
#comments {
  margin-top: 20px;
}
.comment-item {
  background: #181818;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 6px;
}

/* --- CHAÎNE --- */
#channel {
  display: none;
}
.channel-header {
  display: flex;
  align-items: center;
  gap: 16px;
}
.channel-avatar {
  width: 70px;
  height: 70px;
  border-radius: 999px;
  background: linear-gradient(135deg,#22c55e,#38bdf8);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 800;
  color: #000;
}
.channel-info {
  display: flex;
  flex-direction: column;
}
.channel-videos {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
  gap: 16px;
}
</style>
</head>

<body>

<header>
  <div class="logo" onclick="showHome()">
    <div class="logo-icon">A</div> ARCHOU‑Tube
  </div>

  <div class="search">
    <input id="searchInput" placeholder="Rechercher…">
    <button onclick="searchVideos()">🔍</button>
  </div>

  <button onclick="showChannel()">📺 Chaîne</button>
</header>

<main>

<!-- ACCUEIL -->
<div id="home"></div>

<!-- PAGE VIDEO -->
<div id="watch">
  <div class="player">
    <iframe id="player"></iframe>
  </div>

  <h2 id="watchTitle"></h2>
  <p id="watchMeta"></p>

  <div class="actions">
    <button onclick="likeVideo()">👍 J'aime (<span id='likeCount'>0</span>)</button>
    <button onclick="toggleSub()" id="subBtn">🔔 S'abonner</button>
  </div>

  <div id="comments">
    <h3>Commentaires</h3>
    <input id="commentInput" placeholder="Écris un commentaire…" style="width:100%;padding:8px;border-radius:8px;border:none;background:#121212;color:#fff;">
    <button onclick="addComment()" style="margin-top:6px;padding:8px 12px;border-radius:8px;border:none;background:#22c55e;color:#000;font-weight:700;">Envoyer</button>
    <div id="commentList"></div>
  </div>
</div>

<!-- CHAÎNE -->
<div id="channel">
  <div class="channel-header">
    <div class="channel-avatar">A</div>
    <div class="channel-info">
      <h2>Chaîne ARCHOU</h2>
      <p><strong id="subCount">0</strong> abonnés</p>
      <p>Chaîne officielle ARCHOU‑Tube</p>
    </div>
  </div>

  <h3 style="margin-top:20px;">Vidéos de la chaîne</h3>
  <div class="channel-videos" id="channelVideos"></div>
</div>

</main>

<script>
/* --- BASE DE DONNÉES VIDÉOS --- */
const videos = [
  {
    id: "1",
    title: "ARCHOU présente MultiOutilsLikma",
    channel: "ARCHOU Officiel",
    views: "12 345",
    age: "il y a 2 jours",
    thumbnail: "https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg",
    youtubeId: "dQw4w9WgXcQ"
  },
  {
    id: "2",
    title: "Setup Dev ARCHOU 2025",
    channel: "ARCHOU Officiel",
    views: "8 902",
    age: "il y a 1 semaine",
    thumbnail: "https://i.ytimg.com/vi/9bZkp7q19f0/hqdefault.jpg",
    youtubeId: "9bZkp7q19f0"
  },
  {
    id: "3",
    title: "Liou.de — Vidéos de Maman",
    channel: "ARCHOU Family",
    views: "3 210",
    age: "il y a 3 jours",
    thumbnail: "https://i.ytimg.com/vi/3JZ_D3ELwOQ/hqdefault.jpg",
    youtubeId: "3JZ_D3ELwOQ"
  }
];

/* --- AFFICHAGE ACCUEIL --- */
function showHome() {
  document.getElementById("home").style.display = "grid";
  document.getElementById("watch").style.display = "none";
  document.getElementById("channel").style.display = "none";
}
showHome();

function loadHome(v = videos) {
  const home = document.getElementById("home");
  home.innerHTML = "";
  v.forEach(video => {
    home.innerHTML += `
      <div class="video-card" onclick="watch('${video.id}')">
        <img src="${video.thumbnail}">
        <div class="video-title">${video.title}</div>
        <div class="video-meta">${video.channel} • ${video.views} vues • ${video.age}</div>
      </div>
    `;
  });
}
loadHome();

/* --- RECHERCHE --- */
function searchVideos() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const results = videos.filter(v => v.title.toLowerCase().includes(q));
  loadHome(results);
}

/* --- PAGE VIDEO --- */
let currentVideo = null;

function watch(id) {
  currentVideo = videos.find(v => v.id === id);

  document.getElementById("home").style.display = "none";
  document.getElementById("watch").style.display = "block";
  document.getElementById("channel").style.display = "none";

  document.getElementById("player").src = `https://www.youtube.com/embed/${currentVideo.youtubeId}`;
  document.getElementById("watchTitle").textContent = currentVideo.title;
  document.getElementById("watchMeta").textContent = `${currentVideo.views} vues • ${currentVideo.age}`;

  loadComments();
  updateLikes();
  updateSub();
}

/* --- LIKES --- */
function updateLikes() {
  const likes = localStorage.getItem("likes_" + currentVideo.id) || 0;
  document.getElementById("likeCount").textContent = likes;
}
function likeVideo() {
  let likes = localStorage.getItem("likes_" + currentVideo.id) || 0;
  likes++;
  localStorage.setItem("likes_" + currentVideo.id, likes);
  updateLikes();
}

/* --- ABONNEMENTS --- */
function updateSub() {
  const sub = localStorage.getItem("archou_sub") === "true";
  document.getElementById("subBtn").textContent = sub ? "✔️ Abonné" : "🔔 S'abonner";
  document.getElementById("subCount").textContent = sub ? "1" : "0";
}
function toggleSub() {
  const sub = localStorage.getItem("archou_sub") === "true";
  localStorage.setItem("archou_sub", !sub);
  updateSub();
}

/* --- COMMENTAIRES --- */
function loadComments() {
  const list = document.getElementById("commentList");
  const comments = JSON.parse(localStorage.getItem("comments_" + currentVideo.id) || "[]");
  list.innerHTML = comments.map(c => `<div class="comment-item">${c}</div>`).join("");
}
function addComment() {
  const input = document.getElementById("commentInput");
  const text = input.value.trim();
  if (!text) return;

  const comments = JSON.parse(localStorage.getItem("comments_" + currentVideo.id) || "[]");
  comments.push(text);
  localStorage.setItem("comments_" + currentVideo.id, JSON.stringify(comments));

  input.value = "";
  loadComments();
}

/* --- CHAÎNE --- */
function showChannel() {
  document.getElementById("home").style.display = "none";
  document.getElementById("watch").style.display = "none";
  document.getElementById("channel").style.display = "block";

  const list = document.getElementById("channelVideos");
  list.innerHTML = "";
  videos.forEach(v => {
    list.innerHTML += `
      <div class="video-card" onclick="watch('${v.id}')">
        <img src="${v.thumbnail}">
        <div class="video-title">${v.title}</div>
        <div class="video-meta">${v.views} vues • ${v.age}</div>
      </div>
    `;
  });

  updateSub();
}
</script>

</body>
</html>
